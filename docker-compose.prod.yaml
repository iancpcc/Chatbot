version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: dockerfile
      target: runtime
    container_name: booking_engine_api_prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: prod
      AUTO_APPLY_MIGRATIONS: "false"
      SEED_DEMO_DATA: "false"
      WEB_CONCURRENCY: "2"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: booking_engine_postgres_prod
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_prod_data:
