version: "3.9"

services:
  api:
    build: .
    container_name: booking_engine_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    container_name: booking_engine_redis
    ports:
      - "6379:6379"